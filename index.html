<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולחא</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #f5f0e8;
            color: #2c2c2c;
            min-height: 100vh;
        }
        nav {
            background: #3a3a2a;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { color: #e8d9b0; font-size: 1.5em; font-weight: bold; }
        nav .links a {
            color: #ccc;
            text-decoration: none;
            margin-inline-start: 20px;
            cursor: pointer;
        }
        nav .links a:hover { color: #fff; }
        nav .links a.active { color: #e8d9b0; border-bottom: 2px solid #e8d9b0; }

        .page { display: none; padding: 40px 24px; max-width: 700px; margin: 0 auto; }
        .page.visible { display: block; }

        h1 { margin-bottom: 20px; color: #3a3a2a; }
        h2 { margin-bottom: 16px; color: #4a4a3a; }

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        input, button {
            font-size: 1em;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        input { width: 100%; margin-bottom: 12px; }
        button {
            background: #3a3a2a;
            color: #e8d9b0;
            border: none;
            cursor: pointer;
            padding: 10px 24px;
        }
        button:hover { background: #4a4a3a; }

        .error { color: #c0392b; margin-bottom: 10px; }
        .success { color: #27ae60; margin-bottom: 10px; }

        .views-table {
            width: 100%;
            border-collapse: collapse;
        }
        .views-table th, .views-table td {
            padding: 10px 14px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }
        .views-table th { background: #f5f0e8; font-weight: bold; }
        .views-count { font-size: 1.3em; font-weight: bold; color: #3a3a2a; }

        .logout-btn {
            background: transparent;
            color: #c0392b;
            border: 1px solid #c0392b;
            font-size: 0.85em;
            padding: 6px 14px;
        }
        .logout-btn:hover { background: #c0392b; color: #fff; }
    </style>
</head>
<body>

<nav>
    <div class="logo">סולחא</div>
    <div class="links">
        <a onclick="navigate('hutz')" id="nav-hutz">חוץ</a>
        <a onclick="navigate('pnim')" id="nav-pnim">פנים</a>
        <a onclick="navigate('pnim-pnim')" id="nav-pnim-pnim" style="display:none;">פנים פנים</a>
        <span id="user-area"></span>
    </div>
</nav>

<!-- חוץ -->
<div id="page-hutz" class="page visible">
    <div class="card">
        <h1>שלום עולם</h1>
        <p>ברוכים הבאים לסולחא.</p>
    </div>
</div>

<!-- פנים - רישום והתחברות -->
<div id="page-pnim" class="page">
    <div class="card" id="auth-form">
        <h2 id="auth-title">התחברות</h2>
        <div id="auth-message"></div>
        <input type="text" id="auth-username" placeholder="שם משתמש">
        <input type="password" id="auth-password" placeholder="סיסמה">
        <button onclick="doAuth()"><span id="auth-action-text">התחבר</span></button>
        <p style="margin-top:12px;">
            <a href="#" onclick="toggleAuthMode(); return false;" id="auth-toggle">אין לך חשבון? הירשם</a>
        </p>
    </div>
</div>

<!-- פנים פנים - צפיות -->
<div id="page-pnim-pnim" class="page">
    <div class="card">
        <h2>צפיות פנים</h2>
        <p style="margin-bottom:16px; color:#666;">צפיות בכל אזור של המערכת</p>
        <table class="views-table">
            <thead>
                <tr>
                    <th>אזור</th>
                    <th>צפיות</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ליבה</td>
                    <td class="views-count" id="views-liba">0</td>
                </tr>
                <tr>
                    <td>פנים</td>
                    <td class="views-count" id="views-pnim">0</td>
                </tr>
                <tr>
                    <td>חוץ</td>
                    <td class="views-count" id="views-hutz">0</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// --- מצב ---
let currentUser = JSON.parse(localStorage.getItem('sulha_user') || 'null');
let isRegisterMode = false;

// צפיות - localStorage
function getViews() {
    return JSON.parse(localStorage.getItem('sulha_views') || '{"liba":0,"pnim":0,"hutz":0}');
}
function addView(area) {
    const v = getViews();
    v[area] = (v[area] || 0) + 1;
    localStorage.setItem('sulha_views', JSON.stringify(v));
}
function getUsers() {
    return JSON.parse(localStorage.getItem('sulha_users') || '{}');
}
function saveUsers(users) {
    localStorage.setItem('sulha_users', JSON.stringify(users));
}

// --- ניווט ---
function navigate(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
    document.querySelectorAll('nav .links a').forEach(a => a.classList.remove('active'));

    if (page === 'pnim' && currentUser) {
        page = 'pnim-pnim';
    }
    if ((page === 'pnim-pnim') && !currentUser) {
        page = 'pnim';
    }

    document.getElementById('page-' + page).classList.add('visible');
    const navEl = document.getElementById('nav-' + page);
    if (navEl) navEl.classList.add('active');

    // רישום צפייה
    const areaMap = { 'hutz': 'hutz', 'pnim': 'pnim', 'pnim-pnim': 'liba' };
    if (areaMap[page]) addView(areaMap[page]);

    // עדכון צפיות אם בפנים פנים
    if (page === 'pnim-pnim') updateViewsDisplay();
}

function updateViewsDisplay() {
    const v = getViews();
    document.getElementById('views-liba').textContent = v.liba || 0;
    document.getElementById('views-pnim').textContent = v.pnim || 0;
    document.getElementById('views-hutz').textContent = v.hutz || 0;
}

function updateUI() {
    const navPnimPnim = document.getElementById('nav-pnim-pnim');
    const userArea = document.getElementById('user-area');

    if (currentUser) {
        navPnimPnim.style.display = 'inline';
        userArea.innerHTML = `<a style="color:#e8d9b0; margin-inline-start:16px;">${currentUser}</a> <button class="logout-btn" onclick="logout()">יציאה</button>`;
    } else {
        navPnimPnim.style.display = 'none';
        userArea.innerHTML = '';
    }
}

// --- הרשמה / התחברות ---
function toggleAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('auth-title').textContent = isRegisterMode ? 'הרשמה' : 'התחברות';
    document.getElementById('auth-action-text').textContent = isRegisterMode ? 'הירשם' : 'התחבר';
    document.getElementById('auth-toggle').textContent = isRegisterMode ? 'יש לך חשבון? התחבר' : 'אין לך חשבון? הירשם';
    document.getElementById('auth-message').innerHTML = '';
}

function doAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const msgEl = document.getElementById('auth-message');

    if (!username || !password) {
        msgEl.innerHTML = '<div class="error">נא למלא שם משתמש וסיסמה</div>';
        return;
    }

    const users = getUsers();

    if (isRegisterMode) {
        if (users[username]) {
            msgEl.innerHTML = '<div class="error">שם משתמש תפוס</div>';
            return;
        }
        users[username] = password;
        saveUsers(users);
        currentUser = username;
        localStorage.setItem('sulha_user', JSON.stringify(currentUser));
        updateUI();
        navigate('pnim-pnim');
    } else {
        if (!users[username] || users[username] !== password) {
            msgEl.innerHTML = '<div class="error">שם משתמש או סיסמה שגויים</div>';
            return;
        }
        currentUser = username;
        localStorage.setItem('sulha_user', JSON.stringify(currentUser));
        updateUI();
        navigate('pnim-pnim');
    }
}

function logout() {
    currentUser = null;
    localStorage.removeItem('sulha_user');
    updateUI();
    navigate('hutz');
}

// --- אתחול ---
updateUI();
addView('hutz'); // צפייה ראשונה בחוץ
</script>

</body>
</html>
