<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>סולחא</title>
  <style>
    :root {
      --bg: #0a1113;
      --fg: #e7efe6;
      --muted: #8da198;
      --line: rgba(231, 239, 230, .12);
      --accent: #9ae2b0;
      --panel: rgba(10, 17, 19, .78);
    }
    * { box-sizing: border-box; margin: 0; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "Assistant", "Noto Sans Hebrew", sans-serif;
    }
    body { padding: 0; }
    .hidden { display: none !important; }

    /* ═══ סרגל מנהל ═══ */
    .admin-bar {
      background: rgba(0,0,0,.4);
      border-bottom: 1px solid var(--line);
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .admin-bar .ab-label {
      color: var(--accent);
      font-weight: 600;
      margin-inline-end: 8px;
    }
    .admin-bar button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 12px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .admin-bar button:hover { color: var(--fg); border-color: var(--accent); }
    .admin-bar button.active {
      background: var(--accent);
      color: #102016;
      border-color: var(--accent);
    }
    .admin-bar select {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--fg);
      padding: 4px 8px;
      font: inherit;
      font-size: 12px;
    }
    .admin-bar .ab-sep {
      width: 1px;
      height: 20px;
      background: var(--line);
      margin: 0 4px;
    }

    /* ═══ חוץ ═══ */
    .hutz {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .hutz-header {
      text-align: center;
      padding: 48px 24px 24px;
    }
    .hutz-header h1 {
      font-size: 36px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .hutz-header p {
      color: var(--muted);
      font-size: 15px;
    }
    .hutz-body {
      padding: 0 24px 24px;
      display: grid;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      align-content: start;
    }
    .hutz-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: var(--panel);
    }
    .hutz-card h3 {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .hutz-form { display: grid; gap: 10px; }
    .hutz-form label { font-size: 13px; color: var(--muted); }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      color: var(--fg);
      padding: 11px 14px;
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    .input:focus { border-color: var(--accent); }
    textarea.input { min-height: 70px; resize: vertical; }
    .btn {
      border: 0; border-radius: 999px;
      padding: 11px 18px;
      background: var(--accent); color: #102016;
      font: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer;
      justify-self: start;
    }
    .btn:hover { opacity: .85; }
    .sent-msg { color: var(--accent); font-size: 13px; }

    /* צל — הקונדסאים */
    .shadow-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: rgba(154, 226, 176, .03);
      min-height: 200px;
    }
    .shadow-box h3 {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 14px;
    }
    .shadow-pulse {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent);
      margin-inline-end: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:.3; } 50% { opacity:1; } }
    .shadow-stage {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .shadow-node {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      background: rgba(255,255,255,.02);
      transition: all .3s;
    }
    .shadow-node .node-icon {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .shadow-node .node-name {
      font-size: 13px;
      color: var(--fg);
      font-weight: 600;
    }
    .shadow-node .node-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .shadow-node.active {
      border-color: var(--accent);
      background: rgba(154,226,176,.06);
    }

    .hutz-footer {
      padding: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
    .hutz-footer button {
      background: none; border: none;
      color: var(--muted); font: inherit; font-size: 11px;
      cursor: pointer; text-decoration: underline;
      margin-inline-start: 8px;
    }

    /* ═══ פנים ═══ */
    .pnim {
      min-height: 100vh;
    }
    .shell {
      min-height: calc(100vh - 40px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
      margin: 8px;
    }
    .bar {
      display: flex; gap: 12px; align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
    }
    .status { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip {
      padding: 6px 10px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--accent);
    }
    .layout {
      display: grid; grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 0;
    }
    .view { padding: 18px; min-height: 0; overflow: auto; }
    .side {
      border-inline-start: 1px solid var(--line);
      padding: 18px;
      display: grid; grid-template-rows: auto auto 1fr;
      gap: 14px; min-height: 0;
    }
    .box {
      border: 1px solid var(--line); border-radius: 18px;
      padding: 14px; background: rgba(255,255,255,.02);
    }
    .box h3 { margin: 0 0 10px; color: var(--accent); font-size: 14px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button.pnim-btn {
      border: 0; border-radius: 999px; padding: 10px 14px;
      background: var(--accent); color: #102016;
      font: inherit; cursor: pointer;
    }
    button.alt { background: #dfe9dd; }
    #screens { display: grid; gap: 14px; }
    .screen {
      border: 1px solid var(--line); border-radius: 20px;
      overflow: hidden; background: rgba(255,255,255,.02);
    }
    .screen-head {
      display: flex; gap: 10px; align-items: center;
      justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
    }
    .screen-body { padding: 14px; display: grid; gap: 10px; }
    .line { display: flex; flex-wrap: wrap; gap: 2px; align-items: center; min-height: 24px; }
    .glyph {
      display: inline-grid; place-items: center;
      min-width: 1ch; min-height: 1.6em; padding-inline: .08em;
      border-radius: 6px; position: relative;
    }
    .glyph[data-kind="space"] { opacity: .35; }
    .glyph:hover { background: rgba(154,226,176,.12); }
    .list { display: grid; gap: 8px; max-height: 100%; overflow: auto; }
    .item {
      border: 1px solid var(--line); border-radius: 14px;
      padding: 10px 12px; font-size: 13px;
    }
    .empty { color: var(--muted); }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .side { border-inline-start: 0; border-top: 1px solid var(--line); }
      .shadow-stage { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    }
  </style>
</head>
<body>

  <!-- ═══ סרגל מנהל (רק למנהלים) ═══ -->
  <div id="admin-bar" class="admin-bar hidden">
    <span class="ab-label">מנהל</span>
    <button id="ab-hutz" onclick="adminView('חוץ')">חוץ</button>
    <button id="ab-pnim" onclick="adminView('פנים')">פנים</button>
    <button id="ab-nihul" onclick="adminView('ניהול')">ניהול</button>
    <button id="ab-liba" onclick="adminView('ליבה')">ליבה</button>
    <div class="ab-sep"></div>
    <select id="ab-user" onchange="adminSwitchUser(this.value)">
      <option value="עובדיה עדי כהן">עדי</option>
      <option value="שחף גליה כהן">שחף</option>
      <option value="אורח">אורח (חוץ)</option>
    </select>
    <div class="ab-sep"></div>
    <button onclick="doLogout()" style="color:#e55">יציאה</button>
  </div>

  <!-- ═══ חוץ ═══ -->
  <div id="page-hutz" class="hutz">
    <div class="hutz-header">
      <h1>סולחא</h1>
      <p>תקשורת אחודה</p>
    </div>
    <div class="hutz-body">

      <!-- צל — קונדסאים -->
      <div class="shadow-box">
        <h3><span class="shadow-pulse"></span>מה קורה על הבמה</h3>
        <div id="shadow-stage" class="shadow-stage"></div>
      </div>

      <!-- איסוף פרטים -->
      <div class="hutz-card">
        <h3>רוצה לדבר?</h3>
        <div class="hutz-form">
          <label>שם</label>
          <input id="hutz-name" class="input" type="text" placeholder="איך קוראים לך?">
          <label>נושא</label>
          <input id="hutz-subject" class="input" type="text" placeholder="במה אפשר לעזור?">
          <label>פירוט</label>
          <textarea id="hutz-detail" class="input" placeholder="ספר עוד..."></textarea>
          <button class="btn" onclick="sendHutz()">שלח</button>
          <div id="hutz-sent" class="sent-msg hidden">נשלח בהצלחה</div>
        </div>
      </div>

    </div>
    <div class="hutz-footer">
      סולחא · תקשורת אחודה
      <button onclick="showAdminLogin()">כניסת מנהלים</button>
    </div>
  </div>

  <!-- ═══ פנים ═══ -->
  <div id="page-pnim" class="pnim hidden">
    <div class="shell">
      <div class="bar">
        <div class="status">
          <span class="chip" id="status-mode">פנים</span>
          <span class="chip" id="status-route">מנותק</span>
          <span class="chip" id="status-source">...</span>
        </div>
        <div id="status-meta">סולחא.com</div>
      </div>
      <div class="bar" id="status-note">צפה פנים</div>
      <div class="layout">
        <main class="view">
          <div id="screens"></div>
        </main>
        <aside class="side">
          <section class="box">
            <h3>שיחה</h3>
            <input id="request-input" class="input" type="text" placeholder="בקש כיוון">
            <div class="actions">
              <button class="pnim-btn" id="send-btn">שלח</button>
              <button class="pnim-btn alt" id="approve-btn">אשר</button>
              <button class="pnim-btn" id="rogez-btn" style="background:#c44;color:#fff">רוגז</button>
            </div>
          </section>
          <section class="box">
            <h3>כיוון</h3>
            <div id="route-meta" class="list"></div>
          </section>
          <section class="box">
            <h3>רשומות</h3>
            <div id="log-list" class="list"></div>
          </section>
        </aside>
      </div>
    </div>
  </div>

  <!-- דיאלוג כניסת מנהלים -->
  <div id="admin-login-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:grid;place-items:center" onclick="if(event.target===this)this.classList.add('hidden')">
    <div style="background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:32px;width:min(360px,90vw);text-align:center;display:grid;gap:16px">
      <h3 style="color:var(--accent)">כניסת מנהלים</h3>
      <input id="admin-name" class="input" type="text" placeholder="שם מלא" style="text-align:center">
      <button class="btn" onclick="doAdminLogin()" style="justify-self:center">כניסה</button>
      <div id="admin-error" style="color:#e55;font-size:13px;min-height:1.2em"></div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════
// סולחא · דף אחד · חוץ ברירת מחדל · מנהל רואה הכל
// ═══════════════════════════════════════

var PNIM_USERS = ['עובדיה עדי כהן', 'שחף גליה כהן'];
var currentView = 'חוץ';
var currentAdmin = null;

// ═══ תקשורת ═══
function baseUrl() {
  var q = new URLSearchParams(location.search);
  return (q.get('api') || localStorage.getItem('sulha_unified_api') || '').replace(/\/$/, '');
}
function http(path, opts) { return fetch((baseUrl() || '') + path, opts); }
function isPnim(name) { return PNIM_USERS.indexOf(name) >= 0; }

// ═══ כניסת מנהלים ═══
function showAdminLogin() {
  document.getElementById('admin-login-overlay').classList.remove('hidden');
  document.getElementById('admin-name').focus();
}

document.getElementById('admin-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doAdminLogin();
});

function doAdminLogin() {
  var name = (document.getElementById('admin-name').value || '').trim();
  if (!isPnim(name)) {
    document.getElementById('admin-error').textContent = 'לא מורשה';
    return;
  }
  localStorage.setItem('sulha_user', JSON.stringify(name));
  currentAdmin = name;
  document.getElementById('admin-login-overlay').classList.add('hidden');
  activateAdmin(name);
}

function doLogout() {
  localStorage.removeItem('sulha_user');
  currentAdmin = null;
  currentView = 'חוץ';
  document.getElementById('admin-bar').classList.add('hidden');
  document.getElementById('page-pnim').classList.add('hidden');
  document.getElementById('page-hutz').classList.remove('hidden');
}

function activateAdmin(name) {
  currentAdmin = name;
  document.getElementById('admin-bar').classList.remove('hidden');
  document.getElementById('ab-user').value = name;
  S.user = name;
  adminView('פנים');
}

// ═══ סרגל מנהל — toggle תצוגות ═══
function adminView(view) {
  currentView = view;
  // עדכון כפתורים
  ['ab-hutz','ab-pnim','ab-nihul','ab-liba'].forEach(function(id) {
    document.getElementById(id).classList.remove('active');
  });
  var map = {'חוץ':'ab-hutz','פנים':'ab-pnim','ניהול':'ab-nihul','ליבה':'ab-liba'};
  if (map[view]) document.getElementById(map[view]).classList.add('active');

  if (view === 'חוץ') {
    document.getElementById('page-pnim').classList.add('hidden');
    document.getElementById('page-hutz').classList.remove('hidden');
  } else {
    document.getElementById('page-hutz').classList.add('hidden');
    document.getElementById('page-pnim').classList.remove('hidden');
    S.page = view;
    loadData();
    render();
  }
}

function adminSwitchUser(name) {
  S.user = name;
  if (name === 'אורח') {
    adminView('חוץ');
  } else {
    loadData();
    render();
  }
}

// ═══ חוץ — צל קונדסאים ═══

var KONDENSAIM = [
  {icon: '🎪', name: 'קרקס הפלאים', states: ['מחמם', 'על הבמה', 'הפסקה', 'סיום']},
  {icon: '🏗️', name: 'בונה מגדלים', states: ['מתכנן', 'יוצק', 'מטפס', 'מנוח']},
  {icon: '🎭', name: 'תיאטרון הצל', states: ['חזרה', 'הצגה', 'מחיאות', 'וילון']},
  {icon: '🚀', name: 'תחנת שיגור', states: ['ספירה לאחור', 'שיגור', 'במסלול', 'נחיתה']},
  {icon: '🌊', name: 'גולש גלים', states: ['ממתין', 'תופס גל', 'גולש', 'צולל']},
  {icon: '🎨', name: 'סטודיו הצבע', states: ['מערבב', 'צובע', 'מייבש', 'תולה']},
  {icon: '🔬', name: 'מעבדת חידות', states: ['חוקר', 'מנסה', 'מגלה', 'רושם']},
  {icon: '🎵', name: 'תזמורת רחוב', states: ['מכוון', 'מנגן', 'סולו', 'קצה']},
];

var shadowState = {};

function updateShadow() {
  var stage = document.getElementById('shadow-stage');
  stage.innerHTML = '';

  KONDENSAIM.forEach(function(k, i) {
    // מצב פסאודו-אקראי שמשתנה כל כמה שניות
    if (!shadowState[i] || Math.random() < 0.3) {
      shadowState[i] = Math.floor(Math.random() * k.states.length);
    }
    var stateIdx = shadowState[i];
    var isActive = stateIdx === 1 || stateIdx === 2;

    var node = document.createElement('div');
    node.className = 'shadow-node' + (isActive ? ' active' : '');
    node.innerHTML =
      '<div class="node-icon">' + k.icon + '</div>' +
      '<div class="node-name">' + k.name + '</div>' +
      '<div class="node-status">' + k.states[stateIdx] + '</div>';
    stage.appendChild(node);
  });
}

updateShadow();
setInterval(updateShadow, 4000);

// ═══ חוץ — שליחת פרטים ═══
function sendHutz() {
  var name = (document.getElementById('hutz-name').value || '').trim() || 'אורח';
  var subject = document.getElementById('hutz-subject').value.trim();
  var detail = document.getElementById('hutz-detail').value.trim();
  if (!subject) return;
  var text = subject + (detail ? ' — ' + detail : '');
  http('/api/אחוד', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'מי': name, 'מה': text, 'פעולה': 'בקשה', 'ממשק': 'חוץ', 'דף': 'חוץ', 'משתמש': name})
  }).catch(function(){});
  document.getElementById('hutz-subject').value = '';
  document.getElementById('hutz-detail').value = '';
  var msg = document.getElementById('hutz-sent');
  msg.classList.remove('hidden');
  setTimeout(function() { msg.classList.add('hidden'); }, 3000);
}

// ═══════════════════════════════════════
// פנים
// ═══════════════════════════════════════

var S = {
  user: null, page: 'פנים', sub: null,
  route: null, source: '', time: '',
  requests: [], done: [],
  ws: null, connected: false,
  viewport: {w: innerWidth, h: innerHeight},
  sent: {},
};

function isAdmin() { return PNIM_USERS.indexOf(S.user) >= 0; }

function connectWs() {
  var q = new URLSearchParams(location.search);
  var explicit = q.get('ws') || localStorage.getItem('sulha_ws') || '';
  var host = location.hostname;
  if (!explicit && host !== 'localhost' && host !== '127.0.0.1' && !host.startsWith('192.168.')) return;
  var url = explicit || ((location.protocol === 'https:' ? 'wss://' : 'ws://') + host + ':8772');
  try {
    S.ws = new WebSocket(url);
    S.ws.onopen = function() { S.connected = true; S.source = 'WS'; render(); };
    S.ws.onclose = function() { S.connected = false; render(); };
    S.ws.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d['מה'] === 'צפה_אחודה' || d['מה'] === 'מבקש') loadData();
      } catch(_) {}
    };
  } catch(_) {}
}

async function loadData() {
  try {
    var ps = [http('/api/שעה').then(function(r){return r.json();})];
    if (S.user) ps.push(http('/api/צפה-מבקש?' + new URLSearchParams({
      'משתמש': S.user,
      'דף': isAdmin() ? 'פיתוח' : 'משתמש',
      'רוחב': String(S.viewport.w),
      'גובה': String(S.viewport.h),
    })).then(function(r){return r.json();}));
    var r = await Promise.all(ps);
    S.time = r[0]['שעה'] || '';
    if (r[1]) { S.requests = r[1]['בקשות'] || []; S.done = r[1]['בוצעו'] || []; }
  } catch(_) {}
  render();
}

async function sendRequest(kind) {
  var input = document.getElementById('request-input');
  var text = (input.value || '').trim();
  if (!text) return;
  var key = (S.user || '?') + '|' + kind + '|' + text;
  if (S.sent[key]) return;
  S.sent[key] = true;
  await http('/api/אחוד', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      'מי': S.user || 'עובדיה עדי כהן',
      'מה': text, 'פעולה': kind,
      'ממשק': 'סולחא.com', 'דף': S.page
    })
  }).catch(function(){});
  input.value = '';
  await loadData();
}

async function redoReq(num, direction) {
  if (!S.user) return;
  var key = S.user + '|redo|' + num + '|' + direction;
  if (S.sent[key]) return;
  S.sent[key] = true;
  await http('/api/מבקש/בצע-מחדש', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'משתמש': S.user, 'מספר': num, 'כיוון': direction})
  }).catch(function(){});
  await loadData();
}

function glyphNode(screenId, li, gi, ch) {
  var span = document.createElement('span');
  span.className = 'glyph';
  span.dataset.address = screenId + '/' + li + '/' + gi;
  span.dataset.kind = ch === ' ' ? 'space' : 'glyph';
  span.textContent = ch === ' ' ? '\u00B7' : ch;
  return span;
}

function screenNode(screen, idx) {
  var id = screen.id || 'screen-' + idx;
  var root = document.createElement('section');
  root.className = 'screen';
  var head = document.createElement('div');
  head.className = 'screen-head';
  head.innerHTML = '<span>' + (screen.title || id) + '</span><span>' + (screen.mode || 'צפה') + '</span>';
  var body = document.createElement('div');
  body.className = 'screen-body';
  var lines = Array.isArray(screen.lines) ? screen.lines : (screen.text || screen.body || '').split(/\r?\n/);
  lines.forEach(function(line, li) {
    var row = document.createElement('div');
    row.className = 'line';
    Array.from(line || ' ').forEach(function(ch, gi) { row.appendChild(glyphNode(id, li, gi, ch)); });
    body.appendChild(row);
  });
  root.append(head, body);
  return root;
}

function renderScreens(screens) {
  var mount = document.getElementById('screens');
  mount.innerHTML = '';
  if (!screens || !screens.length) {
    mount.innerHTML = '<div class="empty">אין צפה פעילה.</div>';
    return;
  }
  screens.forEach(function(s, i) { mount.appendChild(screenNode(s, i)); });
}

function renderList(id, rows) {
  var el = document.getElementById(id);
  el.innerHTML = '';
  if (!rows.length) { el.innerHTML = '<div class="empty">אין</div>'; return; }
  rows.forEach(function(r) { var d = document.createElement('div'); d.className = 'item'; d.textContent = r; el.appendChild(d); });
}

function computeView() {
  S.viewport = {w: innerWidth, h: innerHeight};
  var open = S.requests.filter(function(r) { return r['מצב'] !== 'בוצע'; });
  var t = S.time ? S.time.split('T')[1].split('.')[0] : '...';

  if (S.page === 'פנים') {
    return [{
      id: 'pnim', title: 'צפה פנים', mode: 'זמן אמת',
      text: 'משתמש: ' + (S.user || '?') +
        '\nבקשות פתוחות: ' + open.length +
        '\nבוצעו: ' + S.done.length +
        '\nשעה: ' + t +
        '\nשטח: ' + S.viewport.w + 'x' + S.viewport.h
    }];
  }

  if (S.page === 'ניהול') {
    var all = [].concat(S.requests, S.done).sort(function(a,b) { return (a['מספר']||0)-(b['מספר']||0); });
    var lines = all.slice(-15).map(function(r) {
      var st = r['מצב'] === 'בוצע' ? '\u2713' : '\u2717';
      return st + ' #' + (r['מספר']||'?') + ' ' + (r['מה']||'').substring(0,60);
    });
    return [{
      id: 'nihul', title: 'ניהול', mode: 'בקשות: ' + all.length,
      text: lines.join('\n') || 'אין בקשות'
    }];
  }

  if (S.page === 'ליבה') {
    return [{
      id: 'liba', title: 'ליבה · צפה פנים', mode: 'אברהם מצייר',
      text: 'סולחא · ליבה\nתקשורת אחודה פעילה\nשעה: ' + t +
        '\nמשתמש: ' + (S.user||'?') +
        '\nשטח: ' + S.viewport.w + 'x' + S.viewport.h +
        '\nבקשות: ' + (S.requests.length + S.done.length) +
        '\nפתוחות: ' + open.length
    }];
  }

  return [{id:'default',title:'צפה',text:'טוען...'}];
}

function render() {
  var t = S.time ? S.time.split('T')[1].split('.')[0] : '...';
  document.getElementById('status-mode').textContent = S.page;
  document.getElementById('status-route').textContent = S.connected ? 'מחובר' : 'מנותק';
  document.getElementById('status-source').textContent = t;
  document.getElementById('status-note').textContent = S.user ? S.user + ' · ' + S.page : 'צפה פנים';

  renderScreens(computeView());

  var open = S.requests.filter(function(r) { return r['מצב'] !== 'בוצע'; });
  renderList('route-meta', [
    'משתמש: ' + (S.user || 'אורח'),
    'בקשות: ' + (S.requests.length + S.done.length),
    'פתוחות: ' + open.length,
    'שטח: ' + S.viewport.w + 'x' + S.viewport.h,
  ]);
  renderList('log-list', open.slice(-8).map(function(r) { return '#' + (r['מספר']||'?') + ' ' + (r['מה']||'').substring(0,50); }));
}
