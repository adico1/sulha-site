<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>סולחא</title>
  <style>
    :root {
      --bg: #0a1113;
      --fg: #e7efe6;
      --muted: #8da198;
      --line: rgba(231, 239, 230, .12);
      --accent: #9ae2b0;
      --panel: rgba(10, 17, 19, .78);
    }
    * { box-sizing: border-box; margin: 0; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "Assistant", "Noto Sans Hebrew", sans-serif;
    }
    body { padding: 16px; }
    .hidden { display: none !important; }

    /* ═══ כניסה ═══ */
    #login-page {
      min-height: calc(100vh - 32px);
      display: grid;
      place-items: center;
    }
    .login-box {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      padding: 48px 32px;
      display: grid;
      gap: 20px;
      text-align: center;
    }
    .login-box h1 { font-size: 32px; color: var(--accent); }
    .login-box p { color: var(--muted); font-size: 14px; }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      color: var(--fg);
      padding: 14px 16px;
      font: inherit;
      font-size: 16px;
      outline: none;
      text-align: center;
    }
    .input:focus { border-color: var(--accent); }
    .btn {
      border: 0; border-radius: 999px;
      padding: 14px 20px;
      background: var(--accent); color: #102016;
      font: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: .85; }
    .login-error { color: #e55; font-size: 13px; min-height: 1.4em; }

    /* ═══ פנים (הממשק המלא) ═══ */
    .shell {
      min-height: calc(100vh - 32px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr;
      overflow: hidden;
    }
    .bar {
      display: flex; gap: 12px; align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
    }
    .status { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip {
      padding: 6px 10px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--accent);
    }
    .layout {
      display: grid; grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 0; flex: 1;
    }
    .view { padding: 18px; min-height: 0; overflow: auto; }
    .side {
      border-inline-start: 1px solid var(--line);
      padding: 18px;
      display: grid; grid-template-rows: auto auto 1fr;
      gap: 14px; min-height: 0;
    }
    .box {
      border: 1px solid var(--line); border-radius: 18px;
      padding: 14px; background: rgba(255,255,255,.02);
    }
    .box h3 { margin: 0 0 10px; color: var(--accent); font-size: 14px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button {
      border: 0; border-radius: 999px; padding: 10px 14px;
      background: var(--accent); color: #102016;
      font: inherit; cursor: pointer;
    }
    button.alt { background: #dfe9dd; }
    #screens { display: grid; gap: 14px; }
    .screen {
      border: 1px solid var(--line); border-radius: 20px;
      overflow: hidden; background: rgba(255,255,255,.02);
    }
    .screen-head {
      display: flex; gap: 10px; align-items: center;
      justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
    }
    .screen-body { padding: 14px; display: grid; gap: 10px; }
    .line { display: flex; flex-wrap: wrap; gap: 2px; align-items: center; min-height: 24px; }
    .glyph {
      display: inline-grid; place-items: center;
      min-width: 1ch; min-height: 1.6em; padding-inline: .08em;
      border-radius: 6px; position: relative;
    }
    .glyph[data-kind="space"] { opacity: .35; }
    .glyph:hover { background: rgba(154,226,176,.12); }
    .list { display: grid; gap: 8px; max-height: 100%; overflow: auto; }
    .item {
      border: 1px solid var(--line); border-radius: 14px;
      padding: 10px 12px; font-size: 13px;
    }
    .empty { color: var(--muted); }

    /* ═══ חוץ ═══ */
    .hutz-shell {
      min-height: calc(100vh - 32px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }
    .hutz-welcome { padding: 32px 24px; text-align: center; }
    .hutz-welcome h2 { color: var(--accent); font-size: 22px; margin-bottom: 8px; }
    .hutz-welcome p { color: var(--muted); font-size: 14px; }
    .hutz-body { padding: 18px 24px; display: grid; gap: 18px; align-content: start; overflow: auto; }
    .hutz-section {
      border: 1px solid var(--line); border-radius: 18px;
      padding: 16px; background: rgba(255,255,255,.02);
    }
    .hutz-section h3 { color: var(--accent); font-size: 14px; margin-bottom: 10px; }
    .hutz-form { display: grid; gap: 10px; }
    .hutz-form label { font-size: 13px; color: var(--muted); }
    .hutz-form .input { text-align: start; font-size: 14px; padding: 10px 14px; }
    .hutz-form textarea.input { min-height: 80px; resize: vertical; }
    .hutz-form .btn { font-size: 14px; padding: 10px 16px; justify-self: start; }
    .hutz-shadow {
      border: 1px solid var(--line); border-radius: 18px;
      padding: 16px; background: rgba(154,226,176,.03);
    }
    .hutz-shadow h3 { color: var(--accent); font-size: 14px; margin-bottom: 10px; }
    .shadow-line {
      padding: 6px 0; font-size: 13px; color: var(--muted);
      border-bottom: 1px solid var(--line);
    }
    .shadow-line:last-child { border-bottom: 0; }
    .shadow-pulse {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent);
      margin-inline-end: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:.3; } 50% { opacity:1; } }
    .hutz-footer {
      padding: 14px 18px; border-top: 1px solid var(--line);
      font-size: 12px; color: var(--muted); text-align: center;
    }
    .link-btn {
      background: none; border: 0; color: var(--muted);
      cursor: pointer; font: inherit; font-size: 12px; text-decoration: underline;
    }
    .sent-msg { color: var(--accent); font-size: 13px; }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .side { border-inline-start: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>

  <!-- ═══ דף כניסה ═══ -->
  <div id="login-page">
    <div class="login-box">
      <h1>סולחא</h1>
      <p>תקשורת אחודה</p>
      <input id="login-name" class="input" type="text" placeholder="שם מלא" autofocus>
      <button class="btn" onclick="doLogin()">כניסה</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- ═══ מערכת חוץ ═══ -->
  <div id="hutz-page" class="hutz-shell hidden">
    <div class="bar">
      <div class="status">
        <span class="chip" id="hutz-user">אורח</span>
        <span class="chip" id="hutz-time">...</span>
      </div>
      <div>
        סולחא · חוץ
        <button class="link-btn" onclick="doLogout()" style="margin-inline-start:12px">יציאה</button>
      </div>
    </div>
    <div class="hutz-welcome">
      <h2 id="hutz-greeting">שלום</h2>
      <p>ברוכים הבאים למערכת סולחא. כאן תוכלו לשלוח בקשות ולעקוב אחרי מה שקורה.</p>
    </div>
    <div class="hutz-body">
      <div class="hutz-section">
        <h3>שלח בקשה</h3>
        <div class="hutz-form">
          <label>נושא</label>
          <input id="hutz-subject" class="input" type="text" placeholder="במה אפשר לעזור?">
          <label>פירוט</label>
          <textarea id="hutz-detail" class="input" placeholder="תאר בקצרה..."></textarea>
          <button class="btn" onclick="sendHutz()">שלח</button>
          <div id="hutz-sent" class="sent-msg hidden">הבקשה נשלחה</div>
        </div>
      </div>
      <div class="hutz-shadow">
        <h3><span class="shadow-pulse"></span>מה קורה עכשיו</h3>
        <div id="shadow-feed"><div class="shadow-line">טוען...</div></div>
      </div>
    </div>
    <div class="hutz-footer">סולחא · תקשורת אחודה</div>
  </div>

  <!-- ═══ מערכת פנים ═══ -->
  <div id="pnim-page" class="hidden">
    <div class="shell">
      <div class="bar">
        <div class="status">
          <span class="chip" id="status-mode">מאתחל</span>
          <span class="chip" id="status-route">כיוון: פתוח</span>
          <span class="chip" id="status-source">תקשורת: לא מחובר</span>
        </div>
        <div id="status-meta">סולחא.com</div>
      </div>
      <div class="bar" id="status-note">צפה פנים ממיר ממתין לכיוון.</div>
      <div class="layout">
        <main class="view">
          <div id="screens"></div>
        </main>
        <aside class="side">
          <section class="box">
            <h3>שיחה</h3>
            <input id="request-input" class="input" type="text" placeholder="בקש כיוון">
            <div class="actions">
              <button id="send-btn">שלח</button>
              <button id="approve-btn" class="alt">אשר</button>
              <button id="rogez-btn" style="background:#c44;color:#fff">רוגז</button>
            </div>
          </section>
          <section class="box">
            <h3>כיוון</h3>
            <div id="route-meta" class="list"></div>
          </section>
          <section class="box">
            <h3>רשומות</h3>
            <div id="log-list" class="list"></div>
          </section>
        </aside>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════
// סולחא · דף אחד · כניסה + פנים + חוץ
// ═══════════════════════════════════════

const PNIM_USERS = ['עובדיה עדי כהן', 'שחף גליה כהן'];

// ═══ תקשורת ═══
function baseUrl() {
  const q = new URLSearchParams(location.search);
  return (q.get('api') || localStorage.getItem('sulha_unified_api') || '').replace(/\/$/, '');
}
function http(path, opts) { return fetch((baseUrl() || '') + path, opts); }

function isPnim(name) { return PNIM_USERS.indexOf(name) >= 0; }

// ═══ כניסה ═══
function doLogin() {
  const input = document.getElementById('login-name');
  const name = (input.value || '').trim();
  if (!name) {
    document.getElementById('login-error').textContent = 'הכנס שם מלא';
    return;
  }
  localStorage.setItem('sulha_user', JSON.stringify(name));
  if (isPnim(name)) {
    showPnim(name);
  } else {
    showHutz(name);
  }
}

function doLogout() {
  localStorage.removeItem('sulha_user');
  S.user = null; S.page = 'אתר';
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('pnim-page').classList.add('hidden');
  document.getElementById('hutz-page').classList.add('hidden');
  document.getElementById('login-name').value = '';
}

document.getElementById('login-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ═══ חוץ ═══
let _shadowInterval = null;

function showHutz(name) {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('pnim-page').classList.add('hidden');
  document.getElementById('hutz-page').classList.remove('hidden');
  document.getElementById('hutz-user').textContent = name;
  document.getElementById('hutz-greeting').textContent = 'שלום, ' + name;
  loadShadow();
  if (_shadowInterval) clearInterval(_shadowInterval);
  _shadowInterval = setInterval(loadShadow, 5000);
}

function sendHutz() {
  const name = JSON.parse(localStorage.getItem('sulha_user') || '""');
  const subject = document.getElementById('hutz-subject').value.trim();
  const detail = document.getElementById('hutz-detail').value.trim();
  if (!subject) return;
  const text = subject + (detail ? ' — ' + detail : '');
  http('/api/אחוד', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'מי': name || 'אורח', 'מה': text, 'פעולה': 'בקשה', 'ממשק': 'חוץ', 'דף': 'חוץ', 'משתמש': name || 'אורח'})
  }).catch(function(){});
  document.getElementById('hutz-subject').value = '';
  document.getElementById('hutz-detail').value = '';
  var msg = document.getElementById('hutz-sent');
  msg.classList.remove('hidden');
  setTimeout(function() { msg.classList.add('hidden'); }, 3000);
}

function loadShadow() {
  var feed = document.getElementById('shadow-feed');
  var lines = [];

  Promise.all([
    http('/api/שעה').then(function(r){return r.json();}).catch(function(){return {};}),
    http('/api/צפה').then(function(r){return r.json();}).catch(function(){return {};}),
    http('/api/תור').then(function(r){return r.json();}).catch(function(){return {};})
  ]).then(function(results) {
    var timeRes = results[0];
    var viewRes = results[1];
    var qRes = results[2];

    var now = timeRes['שעה'] || '';
    if (now) {
      var t = now.split('T')[1].split('.')[0];
      lines.push('שעה: ' + t);
    }

    var records = (viewRes['שנה'] && viewRes['שנה']['רשומות']) || viewRes['רשומות'] || [];
    var recent = records.slice(-6);
    if (recent.length > 0) {
      lines.push('פעילות אחרונה:');
      recent.forEach(function(r) {
        lines.push('  ' + (r['מי'] || '?') + ' · ' + (r['מה'] || '').substring(0, 40));
      });
    }

    var pending = ((qRes['בקשות'] || []).filter(function(b) { return b['מצב'] !== 'בוצע'; }));
    var done = qRes['בוצעו'] || [];
    if (pending.length || done.length) {
      lines.push('בקשות פתוחות: ' + pending.length);
      lines.push('בקשות שבוצעו: ' + done.length);
    }

    if (lines.length === 0) lines.push('המערכת פעילה');

    feed.innerHTML = '';
    lines.forEach(function(l) {
      var div = document.createElement('div');
      div.className = 'shadow-line';
      div.textContent = l;
      feed.appendChild(div);
    });
  }).catch(function() {
    feed.innerHTML = '<div class="shadow-line">המערכת פעילה · אין חיבור לשרת כרגע</div>';
  });
}

// ═══════════════════════════════════════
// פנים — הממשק המלא (כמו שהיה)
// ═══════════════════════════════════════

const ADMINS = ['עובדיה עדי כהן', 'שחף גליה כהן'];

const S = {
  user: null,
  page: 'אתר',
  sub: null,
  route: null,
  source: '',
  time: '',
  requests: [],
  done: [],
  ws: null,
  connected: false,
  viewport: {w: innerWidth, h: innerHeight},
  sent: {},
};

const PAGES = {
  'אתר':   {title: 'סולחא', auth: false},
  'פנים':  {title: 'פנים', auth: true},
  'ניהול': {title: 'ניהול', auth: true, admin: true},
  'ליבה':  {title: 'ליבה', auth: true, admin: true},
};

function showPnim(name) {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('hutz-page').classList.add('hidden');
  document.getElementById('pnim-page').classList.remove('hidden');
  S.user = name;
  S.page = 'פנים';
  loadData();
  connectWs();
  render();
}

function connectWs() {
  var q = new URLSearchParams(location.search);
  var explicit = q.get('ws') || localStorage.getItem('sulha_ws') || '';
  var host = location.hostname;
  if (!explicit && host !== 'localhost' && host !== '127.0.0.1' && !host.startsWith('192.168.')) return;
  var url = explicit || ((location.protocol === 'https:' ? 'wss://' : 'ws://') + host + ':8772');
  try {
    S.ws = new WebSocket(url);
    S.ws.onopen = function() { S.connected = true; S.source = 'WS'; render(); };
    S.ws.onclose = function() { S.connected = false; render(); };
    S.ws.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d['מה'] === 'צפה_אחודה' || d['מה'] === 'מבקש') loadData();
      } catch(_) {}
    };
  } catch(_) {}
}

async function loadData() {
  try {
    var ps = [http('/api/שעה').then(function(r){return r.json();})];
    if (S.user) ps.push(http('/api/צפה-מבקש?' + new URLSearchParams({
      'משתמש': S.user,
      'דף': isAdmin() ? 'פיתוח' : 'משתמש',
      'רוחב': String(S.viewport.w),
      'גובה': String(S.viewport.h),
    })).then(function(r){return r.json();}));
    var r = await Promise.all(ps);
    S.time = r[0]['שעה'] || '';
    if (r[1]) { S.requests = r[1]['בקשות'] || []; S.done = r[1]['בוצעו'] || []; }
  } catch(_) {}
  render();
}

async function sendRequest(kind) {
  var input = document.getElementById('request-input');
  var text = (input.value || '').trim();
  if (!text) return;
  var key = (S.user || '?') + '|' + kind + '|' + text;
  if (S.sent[key]) {
    http('/api/אחוד', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({'מי': 'רוגז', 'מה': 'לולאה: ' + key, 'פעולה': 'רוגז', 'ממשק': 'סולחא.com', 'דף': S.page})
    });
    return;
  }
  S.sent[key] = true;
  await http('/api/אחוד', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      'מי': S.user || 'עובדיה עדי כהן',
      'מה': text, 'פעולה': kind,
      'ממשק': 'סולחא.com',
      'דף': S.page
    })
  }).then(function(r){return r.json();}).then(function(p) { S.source = 'HTTP'; });
  input.value = '';
  await loadData();
}

async function redoReq(num, direction) {
  if (!S.user) return;
  var key = S.user + '|redo|' + num + '|' + direction;
  if (S.sent[key]) {
    http('/api/אחוד', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({'מי': 'רוגז', 'מה': 'לולאה: ' + key, 'פעולה': 'רוגז', 'ממשק': 'סולחא.com', 'דף': S.page})
    });
    return;
  }
  S.sent[key] = true;
  await http('/api/מבקש/בצע-מחדש', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({'משתמש': S.user, 'מספר': num, 'כיוון': direction})
  });
  await loadData();
}

function isAdmin() { return ADMINS.indexOf(S.user) >= 0; }

function nav(page) {
  var p = PAGES[page];
  if (!p) return;
  if (p.auth && !S.user) return;
  if (p.admin && !isAdmin()) return;
  S.page = page; S.sub = null; render();
}

function showSub(name) { S.sub = name; render(); }
function hideSub() { S.sub = null; render(); }

function glyphNode(screenId, li, gi, ch) {
  var span = document.createElement('span');
  span.className = 'glyph';
  span.dataset.address = screenId + '/' + li + '/' + gi;
  span.dataset.kind = ch === ' ' ? 'space' : 'glyph';
  span.textContent = ch === ' ' ? '\u00B7' : ch;
  return span;
}

function screenNode(screen, idx) {
  var id = screen.id || 'screen-' + idx;
  var root = document.createElement('section');
  root.className = 'screen';
  var head = document.createElement('div');
  head.className = 'screen-head';
  head.innerHTML = '<span>' + (screen.title || id) + '</span><span>' + (screen.mode || 'צפה') + '</span>';
  var body = document.createElement('div');
  body.className = 'screen-body';
  var lines = Array.isArray(screen.lines) ? screen.lines : (screen.text || screen.body || '').split(/\r?\n/);
  lines.forEach(function(line, li) {
    var row = document.createElement('div');
    row.className = 'line';
    Array.from(line || ' ').forEach(function(ch, gi) { row.appendChild(glyphNode(id, li, gi, ch)); });
    body.appendChild(row);
  });
  root.append(head, body);
  return root;
}

function renderScreens(screens) {
  var mount = document.getElementById('screens');
  mount.innerHTML = '';
  if (!screens || !screens.length) {
    mount.innerHTML = '<div class="empty">אין צפה פעילה.</div>';
    return;
  }
  screens.forEach(function(s, i) { mount.appendChild(screenNode(s, i)); });
}

function renderList(id, rows) {
  var el = document.getElementById(id);
  el.innerHTML = '';
  if (!rows.length) { el.innerHTML = '<div class="empty">אין</div>'; return; }
  rows.forEach(function(r) { var d = document.createElement('div'); d.className = 'item'; d.textContent = r; el.appendChild(d); });
}

function computeView() {
  S.viewport = {w: innerWidth, h: innerHeight};
  var open = S.requests.filter(function(r) { return r['מצב'] !== 'בוצע'; });
  var t = S.time ? S.time.split('T')[1].split('.')[0] : '...';

  if (S.page === 'אתר') {
    return [{
      id: 'welcome', title: 'שלום עולם', mode: 'חוץ',
      text: 'סולחא — תקשורת אחודה\n\nשלוש שכבות: ליבה, פנים, חוץ\n\n' + (S.user ? 'מחובר: ' + S.user : 'כנס למערכת')
    }];
  }

  if (S.page === 'פנים') {
    return [{
      id: 'pnim', title: 'צפה פנים', mode: 'זמן אמת',
      text: 'משתמש: ' + (S.user || '?') +
        '\nבקשות פתוחות: ' + open.length +
        '\nבוצעו: ' + S.done.length +
        '\nשעה: ' + t +
        '\nשטח: ' + S.viewport.w + 'x' + S.viewport.h
    }];
  }

  if (S.page === 'ניהול') {
    var all = [].concat(S.requests, S.done).sort(function(a,b) { return (a['מספר']||0)-(b['מספר']||0); });
    var lines = all.slice(-15).map(function(r) {
      var st = r['מצב'] === 'בוצע' ? '\u2713' : '\u2717';
      return st + ' #' + (r['מספר']||'?') + ' ' + (r['מה']||'').substring(0,60);
    });
    return [{
      id: 'nihul', title: 'ניהול', mode: 'בקשות: ' + all.length,
      text: lines.join('\n') || 'אין בקשות'
    }];
  }

  if (S.page === 'ליבה') {
    return [{
      id: 'liba', title: 'ליבה · צפה פנים', mode: 'אברהם מצייר',
      text: 'סולחא · ליבה\nאברהם מצייר את הצפה\nתקשורת אחודה פעילה\nשעה: ' + t +
        '\nמשתמש: ' + (S.user||'?') +
        '\nשטח: ' + S.viewport.w + 'x' + S.viewport.h +
        '\nבקשות: ' + (S.requests.length + S.done.length) +
        '\nמחדלים: ' + open.length
    }];
  }

  return [{id:'default',title:'צפה',text:'טוען...'}];
}

function renderSubMachria() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:grid;place-items:center';
  overlay.onclick = function(e) { if (e.target === overlay) hideSub(); };
  var panel = document.createElement('div');
  panel.style.cssText = 'background:var(--bg);border:1px solid var(--line);border-radius:20px;width:min(90vw,700px);max-height:80vh;overflow:auto;padding:20px';
  panel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="color:var(--accent)">מכריע — הכרעה</h3><button onclick="hideSub()" style="background:none;border:0;color:var(--muted);font-size:18px;cursor:pointer">\u2715</button></div>';
  panel.innerHTML += '<p style="color:var(--muted);font-size:13px;margin-bottom:14px">בדוק אם הבקשה בוצעה לשביעות רצונך.</p>';
  if (!S.requests.length) {
    panel.innerHTML += '<div class="empty">אין בקשות להכרעה</div>';
  } else {
    S.requests.forEach(function(r) {
      var d = document.createElement('div');
      d.className = 'item';
      d.style.marginBottom = '8px';
      var n = r['מספר'] || '?';
      d.innerHTML = '<b style="color:var(--accent)">#' + n + '</b> ' + (r['מה']||'') +
        '<br><span style="color:var(--muted);font-size:11px">' + (r['מצב']||'') + '</span>' +
        '<div style="display:flex;gap:6px;margin-top:6px">' +
        '<button onclick="redoReq(' + n + ',\'אושר\');hideSub()" style="font-size:11px;padding:6px 10px">אושר</button>' +
        '<button onclick="redoReq(' + n + ',\'נדחה — ביצוע מחדש\');hideSub()" style="font-size:11px;padding:6px 10px;background:#c44;color:#fff">נדחה</button></div>';
      panel.appendChild(d);
    });
  }
  overlay.appendChild(panel);
  return overlay;
}

function render() {
  var t = S.time ? S.time.split('T')[1].split('.')[0] : '...';
  document.getElementById('status-mode').textContent = S.page;
  document.getElementById('status-route').textContent = S.connected ? 'מחובר' : 'מנותק';
  document.getElementById('status-source').textContent = t;
  document.getElementById('status-meta').textContent = 'סולחא.com';
  document.getElementById('status-note').textContent =
    S.user ? S.user + ' · ' + S.page : 'כנס למערכת';

  var side = document.querySelector('.side');
  var navBox = document.getElementById('nav-box');
  if (!navBox) {
    navBox = document.createElement('section');
    navBox.id = 'nav-box';
    navBox.className = 'box';
    navBox.innerHTML = '<h3>ניווט</h3>';
    side.insertBefore(navBox, side.firstChild);
  }
  var navHTML = '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  if (S.user) {
    navHTML += '<button onclick="nav(\'פנים\')" style="font-size:11px;padding:6px 10px' + (S.page==='פנים'?';border:2px solid var(--accent)':'') + '">פנים</button>';
    if (isAdmin()) {
      navHTML += '<button onclick="nav(\'ניהול\')" style="font-size:11px;padding:6px 10px' + (S.page==='ניהול'?';border:2px solid var(--accent)':'') + '">ניהול</button>';
      navHTML += '<button onclick="nav(\'ליבה\')" style="font-size:11px;padding:6px 10px' + (S.page==='ליבה'?';border:2px solid var(--accent)':'') + '">ליבה</button>';
    }
    navHTML += '<button onclick="doLogout()" class="alt" style="font-size:11px;padding:6px 10px">יציאה</button>';
  }
  navHTML += '</div>';
  navBox.innerHTML = '<h3>ניווט</h3>' + navHTML;

  renderScreens(computeView());

  var open = S.requests.filter(function(r) { return r['מצב'] !== 'בוצע'; });
  renderList('route-meta', [
    'משתמש: ' + (S.user || 'אורח'),
    'בקשות: ' + (S.requests.length + S.done.length),
    'פתוחות: ' + open.length,
    'שטח: ' + S.viewport.w + 'x' + S.viewport.h,
  ]);
  renderList('log-list', open.slice(-8).map(function(r) { return '#' + (r['מספר']||'?') + ' ' + (r['מה']||'').substring(0,50); }));

  var existing = document.getElementById('sub-overlay');
  if (existing) existing.remove();
  if (S.sub === 'מכריע') {
    var ov = renderSubMachria();
    ov.id = 'sub-overlay';
    document.body.appendChild(ov);
  }
}

// ═══ אתחול ═══

document.getElementById('send-btn').addEventListener('click', function() { sendRequest('בקש'); });
document.getElementById('approve-btn').addEventListener('click', function() { showSub('מכריע'); });
document.getElementById('rogez-btn').addEventListener('click', async function() {
  await http('/api/רוגז');
  await loadData();
});

// שחזור משתמש שמור
(function() {
  try {
    var saved = JSON.parse(localStorage.getItem('sulha_user') || 'null');
    if (saved) {
      if (isPnim(saved)) {
        showPnim(saved);
      } else {
        showHutz(saved);
      }
    }
  } catch(_) {}
})();
</script>
</body>
