<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>סולחא</title>
  <style>
    :root {
      --bg: #0a1113;
      --fg: #e7efe6;
      --muted: #8da198;
      --line: rgba(231, 239, 230, .12);
      --accent: #9ae2b0;
      --panel: rgba(10, 17, 19, .78);
    }
    * { box-sizing: border-box; margin: 0; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "Assistant", "Noto Sans Hebrew", sans-serif;
    }
    .hidden { display: none !important; }

    /* ═══ חוץ ═══ */
    .hutz {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .hutz-header {
      text-align: center;
      padding: 48px 24px 24px;
    }
    .hutz-header h1 {
      font-size: 36px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .hutz-header p {
      color: var(--muted);
      font-size: 15px;
    }
    .hutz-body {
      padding: 0 24px 24px;
      display: grid;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      align-content: start;
    }
    .hutz-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: var(--panel);
    }
    .hutz-card h3 {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .hutz-form { display: grid; gap: 10px; }
    .hutz-form label { font-size: 13px; color: var(--muted); }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      color: var(--fg);
      padding: 11px 14px;
      font: inherit; font-size: 14px;
      outline: none;
    }
    .input:focus { border-color: var(--accent); }
    textarea.input { min-height: 70px; resize: vertical; }
    .btn {
      border: 0; border-radius: 999px;
      padding: 11px 18px;
      background: var(--accent); color: #102016;
      font: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; justify-self: start;
    }
    .btn:hover { opacity: .85; }
    .sent-msg { color: var(--accent); font-size: 13px; }

    /* מפת קונדסאים תלת מימד */
    .shadow-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: rgba(154, 226, 176, .03);
      min-height: 380px;
      overflow: hidden;
    }
    .shadow-box h3 {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 14px;
      text-align: center;
    }
    .shadow-pulse {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent);
      margin-inline-end: 6px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:.3; } 50% { opacity:1; } }
    .map3d-wrap {
      perspective: 900px;
      perspective-origin: 50% 40%;
      height: 320px;
      position: relative;
    }
    .map3d {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(55deg) rotateZ(-15deg);
      transition: transform .6s;
    }
    .map3d:hover { transform: rotateX(50deg) rotateZ(-10deg); }
    .map3d-node {
      position: absolute;
      width: 90px; height: 90px;
      border-radius: 16px;
      display: grid; place-items: center;
      text-align: center;
      background: rgba(10, 17, 19, .85);
      border: 1px solid var(--line);
      transform-style: preserve-3d;
      transition: all .5s ease;
      cursor: default;
      backface-visibility: hidden;
    }
    .map3d-node .n-icon { font-size: 26px; }
    .map3d-node .n-name { font-size: 10px; color: var(--fg); font-weight: 600; line-height: 1.2; }
    .map3d-node .n-status { font-size: 9px; color: var(--muted); }
    .map3d-node.active {
      border-color: var(--accent);
      background: rgba(154,226,176,.1);
      box-shadow: 0 0 20px rgba(154,226,176,.2);
    }
    .map3d-node.active .n-icon { animation: bob 1.5s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateZ(0); } 50% { transform: translateZ(20px); } }
    .map3d-link {
      position: absolute; height: 1px;
      background: var(--line);
      transform-origin: 0 0;
      pointer-events: none; opacity: .4;
    }
    .map3d-link.active { background: var(--accent); opacity: .6; height: 2px; }

    .hutz-footer {
      padding: 16px; text-align: center;
      font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--line);
    }

    @media (max-width: 960px) {
      .map3d-wrap { height: 260px; }
      .map3d-node { width: 70px; height: 70px; }
      .map3d-node .n-icon { font-size: 20px; }
      .map3d-node .n-name { font-size: 9px; }
    }
  </style>
</head>
<body>

  <!-- חוץ — מה שכולם רואים -->
  <div id="page-hutz" class="hutz">
    <div class="hutz-header">
      <h1>סולחא</h1>
      <p>שלום עולם</p>
    </div>
    <div class="hutz-body">
      <div class="shadow-box">
        <h3><span class="shadow-pulse"></span>מה קורה על הבמה</h3>
        <div class="map3d-wrap">
          <div id="map3d" class="map3d"></div>
        </div>
      </div>
      <div class="hutz-card">
        <h3>רוצה לדבר?</h3>
        <div class="hutz-form">
          <label>שם</label>
          <input id="hutz-name" class="input" type="text" placeholder="איך קוראים לך?">
          <label>נושא</label>
          <input id="hutz-subject" class="input" type="text" placeholder="במה אפשר לעזור?">
          <label>פירוט</label>
          <textarea id="hutz-detail" class="input" placeholder="ספר עוד..."></textarea>
          <button class="btn" onclick="sendHutz()">שלח</button>
          <div id="hutz-sent" class="sent-msg hidden">נשלח</div>
        </div>
      </div>
    </div>
    <div class="hutz-footer">סולחא</div>
  </div>


<script>
// ═══════════════════════════════════════
// סולחא · חוץ בלבד
// חטטן ב-View Source רואה רק קונדסאים
// הפנים נטען מהשרת רק למורשים
// ═══════════════════════════════════════

// ═══ מפת קונדסאים תלת מימד ═══

var K = [
  {icon: '🎪', name: 'קרקס הפלאים', states: ['מחמם', 'על הבמה', 'הפסקה', 'סיום'], x: 15, y: 15},
  {icon: '🏗️', name: 'בונה מגדלים', states: ['מתכנן', 'יוצק', 'מטפס', 'מנוח'], x: 55, y: 8},
  {icon: '🎭', name: 'תיאטרון הצל', states: ['חזרה', 'הצגה', 'מחיאות', 'וילון'], x: 85, y: 20},
  {icon: '🚀', name: 'תחנת שיגור', states: ['ספירה לאחור', 'שיגור', 'במסלול', 'נחיתה'], x: 10, y: 50},
  {icon: '🌊', name: 'גולש גלים', states: ['ממתין', 'תופס גל', 'גולש', 'צולל'], x: 45, y: 42},
  {icon: '🎨', name: 'סטודיו הצבע', states: ['מערבב', 'צובע', 'מייבש', 'תולה'], x: 78, y: 48},
  {icon: '🔬', name: 'מעבדת חידות', states: ['חוקר', 'מנסה', 'מגלה', 'רושם'], x: 25, y: 75},
  {icon: '🎵', name: 'תזמורת רחוב', states: ['מכוונן', 'מנגן', 'סולו', 'קצה'], x: 62, y: 72},
  {icon: '🧪', name: 'מפעל הבועות', states: ['ממלא', 'מנפח', 'משחרר', 'פוצץ'], x: 40, y: 88},
  {icon: '🎡', name: 'גלגל ענק', states: ['עולה', 'בפסגה', 'יורד', 'עוצר'], x: 90, y: 78},
];
var L = [[0,1],[1,2],[0,3],[3,4],[4,5],[2,5],[3,6],[4,7],[6,7],[6,8],[7,9],[8,9],[1,4]];
var ss = {};
var al = 3;

function bm() {
  var m = document.getElementById('map3d');
  m.innerHTML = '';
  L.forEach(function(l, i) {
    var a = K[l[0]], b = K[l[1]];
    var dx = b.x - a.x, dy = b.y - a.y;
    var len = Math.sqrt(dx*dx + dy*dy);
    var ang = Math.atan2(dy, dx) * 180 / Math.PI;
    var e = document.createElement('div');
    e.className = 'map3d-link'; e.id = 'lk-' + i;
    e.style.cssText = 'left:' + a.x + '%;top:' + a.y + '%;width:' + len + '%;transform:rotate(' + ang + 'deg)';
    m.appendChild(e);
  });
  K.forEach(function(k, i) {
    var n = document.createElement('div');
    n.className = 'map3d-node'; n.id = 'kn-' + i;
    n.style.cssText = 'left:calc(' + k.x + '% - 45px);top:calc(' + k.y + '% - 45px);transform:translateZ(0)';
    n.innerHTML = '<div class="n-icon">' + k.icon + '</div><div class="n-name">' + k.name + '</div><div class="n-status" id="ks-' + i + '"></div>';
    m.appendChild(n);
  });
}

function us() {
  var ac = Math.max(1, Math.round(al * K.length / 10));
  K.forEach(function(k, i) {
    if (!ss[i] || Math.random() < 0.35) ss[i] = Math.floor(Math.random() * k.states.length);
    var si = ss[i];
    var on = i < ac && (si === 1 || si === 2);
    var n = document.getElementById('kn-' + i);
    var s = document.getElementById('ks-' + i);
    if (!n || !s) return;
    if (on) { n.classList.add('active'); n.style.transform = 'translateZ(' + (10 + Math.random() * 25) + 'px)'; }
    else { n.classList.remove('active'); n.style.transform = 'translateZ(0)'; }
    s.textContent = k.states[si];
  });
  L.forEach(function(l, i) {
    var e = document.getElementById('lk-' + i);
    if (!e) return;
    var a = document.getElementById('kn-' + l[0]);
    var b = document.getElementById('kn-' + l[1]);
    if (a && b && a.classList.contains('active') && b.classList.contains('active')) e.classList.add('active');
    else e.classList.remove('active');
  });
}

function fa() {
  var now = new Date();
  al = Math.min(10, Math.max(1, Math.round(now.getSeconds() / 6)));
}

bm(); us(); fa();
setInterval(us, 3500);
setInterval(fa, 8000);

// ═══ שליחת פרטים ═══

function sendHutz() {
  var name = (document.getElementById('hutz-name').value || '').trim() || 'אורח';
  var subject = document.getElementById('hutz-subject').value.trim();
  var detail = document.getElementById('hutz-detail').value.trim();
  // שם מוכר — נכנס
  tryEnter(name);
  if (!subject) return;
  var text = subject + (detail ? ' — ' + detail : '');
  var base = (new URLSearchParams(location.search).get('api') || localStorage.getItem('sulha_unified_api') || '').replace(/\/$/, '');
  fetch((base || '') + '/api/hutz', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name, text: text})
  }).catch(function(){});
  document.getElementById('hutz-subject').value = '';
  document.getElementById('hutz-detail').value = '';
  var msg = document.getElementById('hutz-sent');
  msg.classList.remove('hidden');
  setTimeout(function() { msg.classList.add('hidden'); }, 3000);
}

// ═══ זיהוי ═══

var _known = ['עובדיה עדי כהן', 'שחף גליה כהן'];

function tryEnter(name) {
  if (!name) return;
  localStorage.setItem('sulha_user', JSON.stringify(name));
  if (_known.indexOf(name) >= 0) {
    window.location.href = '/p.html';
  }
}

// שם שנשמר בעבר
(function() {
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('sulha_user') || 'null'); } catch(_) {}
  if (saved && _known.indexOf(saved) >= 0) {
    window.location.href = '/p.html';
  }
})();
</script>
</body>
</html>
