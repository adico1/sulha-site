<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>סולחא · שער צומת</title>
  <style>
    :root {
      --bg: #10181b;
      --mist: #dae7df;
      --line: rgba(218,231,223,.18);
      --glass: rgba(18,27,31,.72);
      --signal: #9ee7c2;
      --warn: #f4c28a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(191,148,88,.18), transparent 28%),
        linear-gradient(180deg, #ece1d0, var(--paper));
      font-family: "Assistant", "Noto Sans Hebrew", sans-serif;
      color: var(--mist);
      background:
        radial-gradient(circle at top left, rgba(158,231,194,.12), transparent 26%),
        radial-gradient(circle at bottom right, rgba(244,194,138,.12), transparent 22%),
        linear-gradient(160deg, #0c1214, var(--bg));
      display: grid;
      place-items: center;
    }
    .boot {
      width: min(720px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 48px rgba(0,0,0,.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 54px);
      line-height: .95;
    }
    p {
      margin: 0;
      color: rgba(218,231,223,.78);
      line-height: 1.7;
      font-size: 16px;
    }
    .meta {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .chip {
      display: inline-flex;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--signal);
      background: rgba(158,231,194,.06);
    }
    #status {
      margin-top: 18px;
      color: var(--warn);
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="boot">
    <h1>שער צומת<br>סולחא</h1>
    <p>
      מעטפת זו רק מאתחלת את הצומת. ה־UI עצמו מגיע דינאמית מן הצומת החי דרך התקשורת האחודה.
    </p>
    <div class="meta">
      <span class="chip">bootstrap only</span>
      <span class="chip" id="apiHint">api: local</span>
    </div>
    <div id="status">מאתחל צומת...</div>
  </main>
  <script>
    function apiBase() {
      try {
        const q = new URLSearchParams(location.search);
        const explicit = q.get('api') || localStorage.getItem('sulha_node_api') || localStorage.getItem('sulha_simple_api') || window.SULHA_NODE_API || '';
        return explicit ? String(explicit).replace(/\/$/, '') : '';
      } catch (_) {
        return '';
      }
    }

    function apiUrl(path) {
      const base = apiBase();
      return base ? (base + path) : path;
    }

    async function boot() {
      const status = document.getElementById('status');
      document.getElementById('apiHint').textContent = 'api: ' + (apiBase() || 'local');
      try {
        const response = await fetch(apiUrl('/api/מצב'));
        const data = await response.json();
        const html = data && data.צומת && data.צומת.תוכן ? data.צומת.תוכן.html : '';
        if (!html) {
          status.textContent = 'הצומת עלה אך לא החזיר HTML.';
          return;
        }
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        status.textContent = 'אתחול נכשל\n' + (error && error.message ? error.message : String(error));
      }
    }

    boot();
  </script>
</body>
</html>
