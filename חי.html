<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>סולחא - ניהול</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
header{background:#16213e;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #e8d9b0}
.שם{color:#e8d9b0;font-size:1.3em;font-weight:bold}
.נורה{width:10px;height:10px;border-radius:50%;display:inline-block;margin-inline-end:6px}
.ירוק{background:#27ae60;box-shadow:0 0 6px #27ae60}.אדום{background:#c0392b}.כתום{background:#f39c12}
.תוכן{flex:1;overflow-y:auto;padding:16px}
.אזורים{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.אזור{background:#16213e;border-radius:8px;padding:12px;text-align:center;border:1px solid #2a2a4a}
.אזור-שם{color:#e8d9b0;font-weight:bold;font-size:.85em}.אזור-מספר{font-size:1.6em;font-weight:bold}
.צופה{background:#16213e;border-radius:6px;padding:10px;margin-bottom:6px;border:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center}
.צופה.שינוי{border-color:#e8d9b0;animation:הבהוב .5s}
@keyframes הבהוב{0%{background:#2a2a1a}100%{background:#16213e}}
.רוגז-שורה{background:#2d1b1b;border:1px solid #5a2020;border-radius:6px;padding:8px;margin-bottom:6px;font-size:.8em}
.מטא{font-size:.75em;color:#888}
h3{color:#e8d9b0;margin:12px 0 8px;font-size:.95em}
.ליבה{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ליבה-כרטיס{background:#16213e;border-radius:8px;padding:10px;border:1px solid #2a2a4a;text-align:center}
.ליבה-שם{color:#e8d9b0;font-weight:bold}
</style></head><body>
<header>
<div class="שם">סולחא - ניהול</div>
<div><span class="נורה אדום" id="נורה"></span><span id="סטטוס">מתחבר...</span></div>
</header>
<div class="תוכן" id="תוכן">טוען...</div>
<script>
let ws,מצב_קודם="",hash_קודם="";
function h(o){return JSON.stringify(o)}

function צייר(d){
const ת=d.תוכן||{};
const ל={אבם:ת.אבם||{},אברם:ת.אברם||{},אברהם:ת.אברהם||{}};
const שרת=ת.שרת||{};
const ליבה=שרת.ליבה||{};
const פנים=שרת.פנים||{};
const מחולל=ת.מחולל||{};
const קבצים=ת.קבצים||[];

let html='<div class="ליבה">';
for(const[שם,נ] of Object.entries(ל)){
const ס=נ.ספר||{};
html+=`<div class="ליבה-כרטיס"><div class="ליבה-שם">${שם}</div><div class="מטא">אב: ${נ.אב||'שורש'}</div><div class="מטא">בקש:${ס.בקשות||0} ענה:${ס.תגובות||0} שינוי:${ס.שינויים||0}</div></div>`;
}
html+='</div>';

html+='<div class="אזורים">';
html+=`<div class="אזור"><div class="אזור-שם">ליבה</div><div class="אזור-מספר">${ליבה.ממשקים||'?'}</div><div class="מטא">${ליבה.מחולל_בנים||0} בנים</div></div>`;
html+=`<div class="אזור"><div class="אזור-שם">רוגזים</div><div class="אזור-מספר">${ליבה.רוגזים_ממתינים||0}</div></div>`;
html+=`<div class="אזור"><div class="אזור-שם">קבצים</div><div class="אזור-מספר">${קבצים.length}</div></div>`;
html+='</div>';

if(Object.keys(פנים).length){
html+='<h3>ממשקים</h3>';
for(const[שם,מ] of Object.entries(פנים)){
const נ=מ.מחובר?'ירוק':'אדום';
html+=`<div class="צופה"><div><span class="נורה ${נ}"></span><b>${שם}</b></div><div class="מטא">צפיות:${מ.צפיות||0} רוגזים:${מ.רוגזים||0}</div></div>`;
}}

if(Object.keys(מחולל).length){
html+='<h3>צופים בנים</h3>';
for(const[שם,בן] of Object.entries(מחולל)){
const נ=בן.מחובר?'ירוק':'כתום';
html+=`<div class="צופה"><div><span class="נורה ${נ}"></span>${שם}</div><div class="מטא">צפיות:${בן.צפיות||0}</div></div>`;
}}

document.getElementById("תוכן").innerHTML=html;
}

function חבר(){
ws=new WebSocket("ws://localhost:8772");
ws.onopen=()=>{
document.getElementById("נורה").className="נורה ירוק";
document.getElementById("סטטוס").textContent="מחובר";
};
ws.onclose=()=>{
document.getElementById("נורה").className="נורה אדום";
document.getElementById("סטטוס").textContent="מנותק";
setTimeout(חבר,3000);
};
ws.onmessage=e=>{
const d=JSON.parse(e.data);
if(d.מה==="צפה_פנים"){
const hash=h(d.תוכן);
if(hash!==hash_קודם){hash_קודם=hash;צייר(d)}
}
else if(d.מה==="רוגז"){
document.getElementById("סטטוס").textContent="רוגז חדש";
setTimeout(()=>{if(ws.readyState===1)document.getElementById("סטטוס").textContent="מחובר"},2000);
}
};
}
חבר();
</script></body></html>
